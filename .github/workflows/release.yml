name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version/tag for the release (e.g. v1.92.5)'
        required: true
        type: string

env:
  VERSION: ${{ inputs.version || github.event.release.tag_name }}

jobs:
  build-example:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cc: clang
            cxx: clang++
            name: macOS
            artifact: example-app-macos
            binary: build/example-app
            zip_name: ImGuizmo-example-macos.zip
          - os: windows-latest
            cc: cl
            cxx: cl
            name: Windows
            artifact: example-app-windows
            binary: build/Release/example-app.exe
            zip_name: ImGuizmo-example-windows.zip
          - os: ubuntu-latest
            cc: clang
            cxx: clang++
            name: Linux
            artifact: example-app-linux
            binary: build/example-app
            zip_name: ImGuizmo-example-linux.zip

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libgl-dev mesa-common-dev clang

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Build
        run: cmake --build build --config Release

      - name: Zip artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ${{ matrix.binary }}
          zip -j ${{ matrix.zip_name }} ${{ matrix.binary }}

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ${{ matrix.binary }} -DestinationPath ${{ matrix.zip_name }}
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_name }}
          if-no-files-found: error

  verify-vcpkg:
    name: Verify vcpkg-example
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git ${{ runner.temp }}\vcpkg
          & "${{ runner.temp }}\vcpkg\bootstrap-vcpkg.bat"
        shell: pwsh

      - name: Install vcpkg packages
        run: |
          & "${{ runner.temp }}\vcpkg\vcpkg.exe" install --triplet x64-windows
        shell: pwsh
        working-directory: vcpkg-example

      - name: Configure
        run: cmake -B build -S vcpkg-example -DCMAKE_TOOLCHAIN_FILE=${{ runner.temp }}\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

  release:
    name: Upload Release Assets
    needs: [build-example]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: |
          mkdir -p staging
          cp src/*.h src/*.cpp LICENSE staging/
          tar -czf ImGuizmo-${{ env.VERSION }}-source.tar.gz -C staging .

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ImGuizmo ${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ImGuizmo-${{ env.VERSION }}-source.tar.gz
            artifacts/example-app-macos/ImGuizmo-example-macos.zip
            artifacts/example-app-windows/ImGuizmo-example-windows.zip
            artifacts/example-app-linux/ImGuizmo-example-linux.zip
